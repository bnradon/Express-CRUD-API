<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Items · CRUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="noise" aria-hidden="true"></div>

  <div class="layout">
    <main class="content">

      <div class="content-header">
        <h1>Mis Productos</h1>
        <div class="header-meta">
   
          <span class="status-indicator">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Conectando…</span>
          </span>
        </div>
      </div>

      <div class="error-bar" id="error-bar" role="alert">
        <span id="error-msg">Error desconocido</span>
        <button class="error-close" id="error-close" type="button">✕</button>
      </div>


      <div class="stats">
        <div class="stat-card">
          <span class="stat-label">Productos</span>
          <span class="stat-value" id="stat-count">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Valor total</span>
          <span class="stat-value" id="stat-total">$0</span>
        </div>
      </div>


      <form id="item-form" class="form-card">
        <div class="form-row">
          <input type="text" id="item-name" placeholder="Nombre del ítem" required autocomplete="off">
          <input type="number" id="item-price" placeholder="Precio" min="0" required>
          <button id="add-button" type="submit">+ Agregar</button>
        </div>
      </form>

                      

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Precio</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="item-list"></tbody>
        </table>
        <div class="empty-state" id="empty-state">
          <span>Aún no hay productos para mostrar.</span>
        </div>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
